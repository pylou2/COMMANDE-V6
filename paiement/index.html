<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Choix du format</title>
  <style>
    body {
      font-family: Georgia, serif;
      text-align: center;
      padding: 50px;
      background-color: #fffaf0;
    }
    img {
      width: 50%; /* réduit l’image de moitié */
      height: auto;
      margin: 20px auto;
      display: block;
    }
    h1 {
      color: #444;
      margin-bottom: 20px;
    }
    p {
      font-size: 18px;
      margin-bottom: 30px;
    }
    .btn {
      display: inline-block;
      margin: 15px;
      padding: 15px 30px;
      background: linear-gradient(45deg, #d4af37, #ffd700); /* doré */
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      font-weight: bold;
      box-shadow: 0 4px 6px rgba(0,0,0,0.2);
      transition: transform 0.2s, opacity 0.2s;
    }
    .btn:hover {
      transform: scale(1.05);
      opacity: 0.9;
    }
  </style>
</head>
<body>
  <img src="cover.png" alt="Illustration du livre">
  <h1>Choisissez votre format</h1>
  <p>Le livre est disponible en PDf  en EPUB .La version brochée sera disponible très bientôt.</p>
  <a href="https://buy.stripe.com/7sYfZjb60gB1dyD4eO67S0m" class="btn">📄 PDF — 4,99 €</a>
  <a href="https://buy.stripe.com/5kQ4gB0rmacDfGL8v467S0l">📚 EPUB — 4,99 €</a>

</body>
</html>
